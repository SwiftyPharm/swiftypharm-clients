<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium File Upload Component</title>
  <!-- Google Fonts for modern modern sans-serif (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Center Container for demo purposes */
    body {
      margin: 0;
      padding: 0;
      background-color: #03030c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Main Component Container */
    .upload-container {
      width: 340px;
      background: radial-gradient(circle at 50% 30%, #11122b 0%, #080818 80%);
      border-radius: 20px;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                  inset 0 0 24px rgba(42, 95, 255, 0.08);
    }

    /* Top File Info Row */
    .file-info-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* 3D Layered Folder Icon Layout */
    .folder-icon-container {
      position: relative;
      width: 68px;
      height: 56px;
      filter: drop-shadow(0 6px 20px rgba(26, 63, 204, 0.55));
    }

    .folder-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 58px;
      height: 44px;
      background: linear-gradient(135deg, #112ba1, #1a3fcc);
      border-radius: 6px 12px 6px 6px;
    }
    
    /* Top tab of the back folder layer */
    .folder-back::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 0;
      width: 24px;
      height: 10px;
      background: #112ba1;
      border-radius: 4px 4px 0 0;
    }

    .folder-front {
      position: absolute;
      bottom: 0;
      left: 2px;
      width: 64px;
      height: 44px;
      background: linear-gradient(135deg, #1a3fcc, #2a5fff);
      border-radius: 6px;
      transform: skewX(-3deg);
      overflow: hidden;
    }

    /* Glossy sheen overlay on front folder folder cover */
    .folder-front::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.15), transparent);
    }

    /* Files Pill Badge */
    .badge-files {
      position: absolute;
      bottom: 4px;
      left: -10px;
      z-index: 10;
      background: rgba(30, 80, 240, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }

    /* Typography details */
    .text-details {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .title {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .subtitle {
      color: #8888aa;
      font-size: 13px;
      font-weight: 500;
    }

    /* Progress Wrapper Panel (resembling the layout in image_caad1b.png) */
    .progress-panel {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .progress-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 270-degree arc spinning loader */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-right-color: transparent;
      border-radius: 50%;
      animation: rotate 1s linear infinite;
    }

    .status-text {
      color: #ffffff;
      font-size: 14px;
      font-weight: 400;
    }

    .percentage {
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
    }

    /* Progress bar styling */
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #1a1a2e;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%; /* Initialized at 00% for the animation trigger */
      background: linear-gradient(90deg, #ffffff, #ccccee);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Keyframe Animations */
    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="upload-container">
    <!-- Top File Metadata Section -->
    <div class="file-info-row">
      <div class="folder-icon-container">
        <div class="folder-back"></div>
        <div class="folder-front"></div>
        <div class="badge-files">FILES</div>
      </div>
      <div class="text-details">
        <div class="title">Project Docs Folder</div>
        <div class="subtitle">80MB</div>
      </div>
    </div>

    <!-- Progress Dashboard Box -->
    <div class="progress-panel">
      <div class="progress-status-row">
        <div class="status-left">
          <div class="spinner"></div>
          <span class="status-text">Uploading ...</span>
        </div>
        <div class="percentage">73%</div>
      </div>
      <div class="progress-bar-bg">
        <div id="uploadProgress" class="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // Trigger progress bar filling animation beautifully on load
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const progressBar = document.getElementById("uploadProgress");
        progressBar.style.width = "73%";
      }, 200);
    });
  </script>
</body>
</html>
